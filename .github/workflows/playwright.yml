name: Playwright API + E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-api:
    name: API (Playwright)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes de API
        run: npm run playwright:api
        env:
          API_POSTS_BASE_URL: ${{ secrets.API_POSTS_BASE_URL || 'https://jsonplaceholder.typicode.com' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

  playwright-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-22.04
    needs: playwright-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes E2E
        run: npm run playwright:e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://the-internet.herokuapp.com' }}
          USUARIO: ${{ secrets.USUARIO || 'tomsmith' }}
          SENHA: ${{ secrets.SENHA || 'SuperSecretPassword!' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn
